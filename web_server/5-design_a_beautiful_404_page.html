<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>404 Not Found</title>
	<style>
		body {
			background: linear-gradient(135deg, #f8fafc 60%, #a0aec0 100%);
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
			margin: 0;
			font-family: 'Segoe UI', Arial, sans-serif;
		}
		.container {
			text-align: center;
		}
		.error {
			font-size: 6rem;
			font-weight: bold;
			color: #2d3748;
			letter-spacing: 0.1em;
		}
		.message {
			font-size: 1.5rem;
			color: #4a5568;
			margin-bottom: 2rem;
		}
		.creative {
			font-size: 1.2rem;
			color: #718096;
			margin-bottom: 2rem;
		}
		.home-btn {
			padding: 0.75rem 2rem;
			background: #3182ce;
			color: #fff;
			border: none;
			border-radius: 30px;
			font-size: 1rem;
			cursor: pointer;
			box-shadow: 0 2px 8px rgba(49,130,206,0.15);
			transition: background 0.2s;
		}
		.home-btn:hover {
			background: #2b6cb0;
		}
		.emoji {
			font-size: 3rem;
			margin-bottom: 1rem;
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="emoji">🚀</div>
		<div class="error">404</div>
		<div class="message">Oops! The page you're looking for doesn't exist.</div>
		<div class="creative">Maybe it went on a space adventure.<br>Try heading back to Earth!</div>
		<button class="home-btn" onclick="window.location.href='index.html'">Go Home</button>
	</div>
</body>
</html>
